<!DOCTYPE html>
<html lang="pt-br">
<head>

        <section class="adventure-grid">

            <div class="adventure-item"><img src="image (12).png"></div>
            <div class="adventure-item"><img src="image (13).png"></div>
            <div class="adventure-item"><img src="image (14).png"></div>
            <div class="adventure-item"><img src="image (15).png"></div>

        <section class="dedication">
            <p>Obrigado por tudo. Você é minha parceira e o meu amor eterno.</p>
            <p class="signature">Eu te amo, Daniela!</p>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - Ricardo & Daniela</p>
    </footer>
